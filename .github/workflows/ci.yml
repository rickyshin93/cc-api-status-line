name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      # jq and git are preinstalled on ubuntu-latest runners
      - name: Test (POSIX sh / dash)
        run: bun run test

      - name: Test (bash)
        run: TEST_SH=bash sh tests/run.sh
