name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      # node (the renderer's only runtime) and git are preinstalled on every
      # runner. Drive the harness under bash — Git Bash on windows-latest — which
      # in turn runs `node assets/statusline.mjs`. This is the cross-platform
      # regression guard: the renderer is exercised on real Windows here.
      - name: Test
        run: bash tests/run.sh
        shell: bash
